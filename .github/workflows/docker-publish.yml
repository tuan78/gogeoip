name: Build and Push Docker Image

on:
    push:
        tags:
            - "v*.*.*"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            # Required for OIDC-based provenance attestations
            id-token: write
            attestations: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      # tag with git tag on version pushes (e.g. v1.2.3)
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      # tag with short SHA on version tag pushes
                      type=sha,prefix=sha-
                      # tag latest on version tag pushes
                      type=raw,value=latest

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  provenance: true
                  sbom: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Attest image provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true

            - name: Make GHCR package public
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
                  PACKAGE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
                  gh api \
                    --method PATCH \
                    -H "Accept: application/vnd.github+json" \
                    /user/packages/container/${PACKAGE}/visibility \
                    -f visibility=public || true
