name: Coverage

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    coverage:
        name: Code Coverage
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Download modules
              run: go mod download

            - name: Generate coverage report
              run: |
                  go test -v -race \
                    -coverprofile=coverage.out \
                    -covermode=atomic \
                    ./...

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: coverage.out
                  flags: unittests
                  name: gogeoip-coverage
                  fail_ci_if_error: false
                  # Public repos support tokenless uploads; no secret required.
