# ── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: gogeoip

---
# ── Secret (MaxMind credentials) ─────────────────────────────────────────────
# Replace values with base64-encoded strings:  echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: gogeoip-secrets
  namespace: gogeoip
type: Opaque
data:
  MAXMIND_ACCOUNT_ID: "<base64-encoded-account-id>"
  MAXMIND_LICENSE_KEY: "<base64-encoded-license-key>"

---
# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gogeoip-config
  namespace: gogeoip
data:
  PORT: "8080"
  GEO_DB_PATH: /data/geolite2-country.mmdb
  GEO_DB_REFRESH_INTERVAL: "24h"
  # Set to "redis-svc:6379" if deploying the optional Redis sidecar/service.
  REDIS_ADDR: ""
  REDIS_PASSWORD: ""
  REDIS_LOOKUP_KEY_PREFIX: "gogeoip:lookup:"
  REDIS_LOOKUP_CACHE_TTL: "24h"

---
# ── PersistentVolumeClaim (DB cache) ─────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gogeoip-geodb
  namespace: gogeoip
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gogeoip
  namespace: gogeoip
  labels:
    app: gogeoip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gogeoip
  template:
    metadata:
      labels:
        app: gogeoip
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532   # distroless nonroot UID
        fsGroup: 65532
      containers:
        - name: gogeoip
          image: gogeoip:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gogeoip-config
            - secretRef:
                name: gogeoip-secrets
          volumeMounts:
            - name: geodb
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: geodb
          persistentVolumeClaim:
            claimName: gogeoip-geodb

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gogeoip-svc
  namespace: gogeoip
spec:
  selector:
    app: gogeoip
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP

---
# ── Ingress (optional) ────────────────────────────────────────────────────────
# Requires an ingress controller such as nginx-ingress.
# Remove or adjust host/tls sections as needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gogeoip-ingress
  namespace: gogeoip
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: gogeoip.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gogeoip-svc
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - gogeoip.example.com
  #     secretName: gogeoip-tls
