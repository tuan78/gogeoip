version: "2"

linters:
  default: none
  enable:
    - errcheck        # unchecked errors
    - govet           # go vet checks
    - ineffassign     # unused assignments
    - staticcheck     # static analysis (includes gosimple)
    - unused          # unused code
    - gosec           # security issues
    - misspell        # typos
    - noctx           # http calls without context
    - bodyclose       # unclosed http response bodies
    - revive          # opinionated but configurable linter
  settings:
    gosec:
      excludes:
        - G104   # errors unhandled — already caught by errcheck
        - G118   # goroutine context — intentional in shutdown handler
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt           # formatting
    - goimports       # import ordering

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

exclusions:
  rules:
    - path: _test\.go
      linters:
        - noctx
        - gosec
