run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck        # unchecked errors
    - gosimple        # simplify code
    - govet           # go vet checks
    - ineffassign     # unused assignments
    - staticcheck     # static analysis
    - unused          # unused code
    - gosec           # security issues
    - misspell        # typos
    - noctx           # http calls without context
    - bodyclose       # unclosed http response bodies
    - revive          # opinionated but configurable linter
    - gofmt           # formatting
    - goimports       # import ordering
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters
    - errorlint       # error wrapping issues
    - gocyclo         # cyclomatic complexity
    - funlen          # function length
    - gocognit        # cognitive complexity

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/tuan78/gogeoip

  gosec:
    excludes:
      - G104   # errors unhandled — already caught by errcheck

  revive:
    rules:
      - name: exported
        severity: warning
        arguments:
          - "checkPrivateReceivers"
      - name: package-comments
        severity: warning
        disabled: false
      - name: var-naming
        severity: warning
        disabled: false

  gocyclo:
    min-complexity: 15

  funlen:
    lines: 100
    statements: 50

  gocognit:
    min-complexity: 20

  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - noctx
        - gosec
        - funlen
        - gocyclo
        - gocognit
    - path: cmd/
      linters:
        - revive
      text: "package-comments"
